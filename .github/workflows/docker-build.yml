name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.cuda'
      - 'Dockerfile.cuda13'
      - 'go.mod'
      - 'go.sum'
      - 'proxy/**'
      - 'ui-svelte/**'
      - '.github/workflows/docker-build.yml'
  schedule:
    - cron: "30 5 * * *"  # 5:30 UTC daily (~1:30 AM ET), after llama.cpp daily publish
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rohitpaul/llama-swap

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/mostlygeek/llama-swap.git || true
          git fetch upstream main
          # Only push if upstream has new commits
          NEW_COMMITS=$(git log HEAD..upstream/main --oneline)
          if [ -n "$NEW_COMMITS" ]; then
            echo "New upstream commits found:"
            echo "$NEW_COMMITS"
            git merge upstream/main --no-edit
            git push
          else
            echo "No new upstream commits"
          fi

  build:
    runs-on: ubuntu-latest
    if: always() && (needs.sync-upstream.result == 'success' || needs.sync-upstream.result == 'skipped')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            tags: "latest"
          - dockerfile: Dockerfile.cuda
            tags: "cuda"
          - dockerfile: Dockerfile.cuda13
            tags: "cuda13"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for upstream llama.cpp updates
        id: check-upstream
        run: |
          echo "Checking for llama.cpp updates..."
          
          # Get latest release info
          LATEST=$(curl -s "https://api.github.com/repos/ggml-org/llama.cpp/releases/latest")
          TAG=$(echo "$LATEST" | jq -r '.tag_name')
          PUBLISHED=$(echo "$LATEST" | jq -r '.published_at')
          
          echo "Latest release: $TAG"
          echo "Published: $PUBLISHED"
          
          # Calculate hours since release
          PUB_EPOCH=$(date -d "$PUBLISHED" +%s)
          NOW_EPOCH=$(date +%s)
          HOURS_AGO=$(( (NOW_EPOCH - PUB_EPOCH) / 3600 ))
          
          echo "Hours since release: $HOURS_AGO"
          echo "hours_ago=$HOURS_AGO" >> $GITHUB_OUTPUT
          
          if [ "$HOURS_AGO" -lt 24 ]; then
            echo "🔔 NEW RELEASE in last 24 hours!"
            echo "build_required=true" >> $GITHUB_OUTPUT
          else
            echo "No new release in last 24 hours"
            echo "build_required=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.tags }})
        if: github.event_name == 'workflow_dispatch' || steps.check-upstream.outputs.build_required == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip build - no updates
        if: github.event_name == 'schedule' && steps.check-upstream.outputs.build_required == 'false'
        run: |
          echo "Skipping build - no upstream updates in last 24 hours"
