name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.cuda'
      - 'Dockerfile.cuda13'
      - 'go.mod'
      - 'go.sum'
      - 'proxy/**'
      - 'ui-svelte/**'
      - '.github/workflows/docker-build.yml'
  schedule:
    - cron: "30 5 * * *"  # 5:30 UTC daily (~1:30 AM ET), after llama.cpp daily publish
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rohitpaul/llama-swap

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/mostlygeek/llama-swap.git || true
          git fetch upstream main
          # Only push if upstream has new commits
          NEW_COMMITS=$(git log HEAD..upstream/main --oneline)
          if [ -n "$NEW_COMMITS" ]; then
            echo "New upstream commits found:"
            echo "$NEW_COMMITS"
            git merge upstream/main --no-edit
            git push
          else
            echo "No new upstream commits"
          fi

  build:
    runs-on: ubuntu-latest
    if: always() && (needs.sync-upstream.result == 'success' || needs.sync-upstream.result == 'skipped')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            tags: "latest"
          - dockerfile: Dockerfile.cuda
            tags: "cuda"
          - dockerfile: Dockerfile.cuda13
            tags: "cuda13"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.tags }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
